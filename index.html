<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Us ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #111, #000);
  color: white;
  text-align: center;
  overflow: hidden;
}

.container {
  padding: 40px 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100vh;
}

/* section animation */
.container > div {
  animation: slideUp 0.8s ease;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 20px;
  margin: 10px;
  font-size: 16px;
  cursor: pointer;
  background: white;
  color: #ff4d6d;
  transition: all 0.2s ease;
}

button:hover {
  transform: scale(1.08);
  box-shadow: 0 0 10px rgba(255, 77, 109, 0.5);
}

button:active {
  transform: scale(0.95);
}

.hidden { display: none; }

#text {
  min-height: 100px;
  font-size: 18px;
  line-height: 1.6;
  opacity: 0;
  animation: fadeText 0.5s forwards;
}

@keyframes fadeText {
  to { opacity: 1; }
}

/* hearts */
.heart {
  position: absolute;
  width: 10px;
  height: 10px;
  background: pink;
  transform: rotate(45deg);
  animation: float 6s linear infinite, fadeHeart 6s ease-in-out infinite;
  opacity: 0.7;
}

.heart::before, .heart::after {
  content: '';
  width: 10px;
  height: 10px;
  background: pink;
  position: absolute;
  border-radius: 50%;
}

.heart::before { top: -5px; }
.heart::after { left: -5px; }

@keyframes float {
  from { transform: translateY(100vh) rotate(45deg); }
  to { transform: translateY(-10vh) rotate(45deg); }
}

@keyframes fadeHeart {
  0% { opacity: 0; }
  20% { opacity: 0.8; }
  100% { opacity: 0; }
}

h1, h2 {
  text-shadow: 0 0 8px rgba(255,255,255,0.2);
}

/* final text formatting */
#finalText {
  white-space: pre-line;
}
</style>
</head>

<body>

<audio id="music" loop>
  <source src="your-music.mp3" type="audio/mpeg">
</audio>

<div class="container">

<div id="start">
  <h1>Hey...</h1>
  <p>I made something… just for you</p>
  <button onclick="start()">Start ❤️</button>
</div>

<div id="story" class="hidden">
  <p id="text"></p>
  <button onclick="next()">Continue</button>
</div>

<div id="game" class="hidden">
  <h2 id="question"></h2>
  <div id="choices"></div>
</div>

<div id="finalChoice" class="hidden">
  <h2>So… what about us?</h2>
  <button onclick="yesLove()">Let’s try ❤️</button>
  <button onclick="noLove()">I’m not ready</button>
</div>

<div id="ending" class="hidden">
  <h1>💌</h1>
  <p id="finalText"></p>
</div>

</div>

<script>
let part = 0;
let step = 0;
let loveScore = 0;

const storyParts = [
"It started with something small...",
"I saw your Hari Raya story...",
"And somehow...",
"You stayed on my mind longer than you should have.",
"",
"I wanted to tell you you were beautiful.",
"But I didn’t.",
"I didn’t want to be just another random guy...",
"",
"So I tried something simple.",
"A message... a little funny maybe.",
"",
"And you replied.",
"",
"That’s when everything slowly changed.",
"",
"Day by day...",
"I started waiting for your messages.",
"",
"And without realizing it...",
"I started caring.",
"",
"You said you were afraid.",
"",
"Truth is...",
"I was afraid too."
];

const gameData = [
{
  question: "When we talk... what does it feel like?",
  choices: [
    { text: "It feels special 💖", score: 2 },
    { text: "Just normal", score: 1 }
  ]
},
{
  question: "When you're not talking to me...",
  choices: [
    { text: "You kinda miss it 🥺", score: 2 },
    { text: "You don’t notice", score: 0 }
  ]
},
{
  question: "Right now... your heart says?",
  choices: [
    { text: "There is something ❤️", score: 3 },
    { text: "I’m unsure", score: 1 }
  ]
}
];

function start() {
  document.getElementById("start").classList.add("hidden");
  const story = document.getElementById("story");
  story.classList.remove("hidden");

  const music = document.getElementById("music");
  music.play().catch(() => {});

  typeText(storyParts[part]);
}

function typeText(text) {
  let i = 0;
  const el = document.getElementById("text");
  el.innerHTML = "";
  el.style.opacity = 0;

  let typing = setInterval(() => {
    el.innerHTML += text.charAt(i);
    i++;
    if (i >= text.length) {
      clearInterval(typing);
      el.style.opacity = 1;
    }
  }, 40);
}

function next() {
  part++;

  if (part < storyParts.length) {
    typeText(storyParts[part]);
  } else {
    const story = document.getElementById("story");
    story.classList.add("hidden");

    document.getElementById("game").classList.remove("hidden");
    showQuestion();
  }
}

function showQuestion() {
  let q = gameData[step];
  document.getElementById("question").innerText = q.question;

  let html = "";
  q.choices.forEach(c => {
    html += `<button onclick="choose(${c.score})">${c.text}</button>`;
  });

  document.getElementById("choices").innerHTML = html;
}

function choose(score) {
  loveScore += score;
  document.getElementById("choices").innerHTML = "<p>Thinking...</p>";

  setTimeout(() => {
    step++;
    if (step < gameData.length) {
      showQuestion();
    } else {
      document.getElementById("game").classList.add("hidden");
      document.getElementById("finalChoice").classList.remove("hidden");
    }
  }, 800);
}

function yesLove() {
  showEnding(true);
}

function noLove() {
  showEnding(false);
}

function showEnding(accepted) {
  document.getElementById("finalChoice").classList.add("hidden");
  document.getElementById("ending").classList.remove("hidden");

  let text = "";

  if (accepted) {
    text = "Then… let’s take this slowly.\n\nNo pressure.\n\nNo rushing.\n\nJust two people...\n\nSeeing where this could go.\n\nAnd honestly?\n\nI’d really like that.\n\nWith you. ❤️";
  } else {
    text = "That’s okay.\n\nReally.\n\nBecause what I felt...\n\nWas real.\n\nAnd meeting you...\n\nWas something I’ll never regret.\n\nNo matter what happens next ❤️";
  }

  document.getElementById("finalText").innerText = text;
}

/* hearts */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 400);
</script>

</body>
</html>
